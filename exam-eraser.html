<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>試卷橡皮擦</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      padding: 12px;
      color: #333;
    }
    .container { max-width: 540px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.4rem; margin-bottom: 14px; letter-spacing: 3px; }
    
    .upload-zone {
      border: 2px dashed #bbb;
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: #888; background: #fafafa; }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 42px; margin-bottom: 8px; }
    .upload-text { color: #666; font-size: 0.9rem; line-height: 1.5; }
    .upload-text span { color: #007aff; font-weight: 500; }
    .upload-formats { font-size: 0.78rem; color: #aaa; margin-top: 6px; }
    
    .status {
      text-align: center; padding: 10px 14px; border-radius: 10px;
      font-size: 0.88rem; display: none; margin-bottom: 12px;
    }
    .status.show { display: block; }
    .status.processing { background: #fff8e6; color: #8a6000; }
    .status.done { background: #d4edda; color: #1e6e35; }
    .status.error { background: #fde8e8; color: #8b2020; }
    
    .panel {
      background: #fff; border-radius: 12px; padding: 14px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: none;
    }
    .panel.show { display: block; }
    .panel-title { font-size: 0.78rem; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    
    canvas { width: 100%; border-radius: 8px; border: 1px solid #eee; display: block; }
    
    .btn {
      padding: 12px 20px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; width: 100%; margin-top: 8px;
    }
    .btn-primary { background: #007aff; color: #fff; }
    .btn-primary:active { background: #0062cc; }
    .btn-secondary { background: #f0f0f0; color: #444; }
    .btn-secondary:active { background: #e0e0e0; }
    
    .info-bar {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .info-chip {
      background: #f5f5f5; border-radius: 20px; padding: 4px 10px;
      font-size: 0.75rem; color: #666;
    }
    
    .tips {
      background: #fff; border-radius: 12px; padding: 14px;
      font-size: 0.82rem; color: #777; line-height: 1.7;
    }
    .tips strong { color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>試卷橡皮擦</h1>
    
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📄</div>
      <div class="upload-text">
        點擊上傳或拖放檔案<br>
        <span>支援 JPG、PNG、PDF</span>
      </div>
      <div class="upload-formats">圖片或 PDF 都可以</div>
      <input type="file" id="fileInput" accept="image/*,.pdf">
    </div>
    
    <div class="status" id="status"></div>
    
    <div class="panel" id="resultPanel">
      <div class="info-bar">
        <div class="info-chip" id="infoPages">1 頁</div>
        <div class="info-chip" id="infoBoxes">偵測到 0 個答案格</div>
      </div>
      <div class="panel-title">處理結果</div>
      <canvas id="previewCanvas"></canvas>
      <button class="btn btn-secondary" id="retryBtn">重新處理</button>
      <button class="btn btn-primary" id="downloadBtn">下載結果</button>
    </div>
    
    <div class="tips">
      <strong>原理：</strong><br>
      自動偵測試卷上的方格和橫線，辨識出「作答區域」後只清除該區域內的筆跡，保留印刷內容及格線結構成為空白卷。
    </div>
  </div>

  <!-- OpenCV.js -->
  <script src="https://cdn.jsdelivr.net/npm/opencv-js@1.2.0/lib/opencv.min.js"></script>
  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  
  <script>
    const $ = id => document.getElementById(id);
    const zone = $('uploadZone');
    const fileInput = $('fileInput');
    const status = $('status');
    const resultPanel = $('resultPanel');
    const previewCanvas = $('previewCanvas');
    const ctx = previewCanvas.getContext('2d');
    const cvReady = new Promise(r => window.addEventListener('load', r));
    
    let pages = []; // Array of { img: ImageData, boxes: [], lines: [] }
    let currentPage = 0;
    
    // Init PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    
    // Drag & drop
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    $('retryBtn').addEventListener('click', () => renderPage(currentPage));
    $('downloadBtn').addEventListener('click', downloadResult);
    
    async function handleFile(file) {
      showStatus('載入檔案中...', 'processing');
      
      if (file.name.toLowerCase().endsWith('.pdf')) {
        await loadPDF(file);
      } else {
        await loadImage(file);
      }
    }
    
    async function loadImage(file) {
      const img = new Image();
      img.onload = async () => {
        await cvReady;
        showStatus('AI 分析卷面結構...', 'processing');
        const result = await processImage(img);
        pages = [result];
        currentPage = 0;
        renderPage(0);
      };
      img.src = URL.createObjectURL(file);
    }
    
    async function loadPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      await cvReady;
      
      pages = [];
      
      for (let i = 1; i <= pdf.numPages; i++) {
        showStatus(`處理第 ${i} / ${pdf.numPages} 頁...`, 'processing');
        const page = await pdf.getPage(i);
        const scale = 2; // Higher scale for better detection
        const viewport = page.getViewport({ scale });
        
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const renderCtx = canvas.getContext('2d');
        
        await page.render({ canvasContext: renderCtx, viewport }).promise;
        
        const img = new Image();
        img.src = canvas.toDataURL();
        await new Promise(r => img.onload = r);
        
        const result = await processImage(img);
        pages.push(result);
      }
      
      currentPage = 0;
      renderPage(0);
    }
    
    async function processImage(img) {
      return new Promise(resolve => {
        const maxW = 1600;
        const scale = img.width > maxW ? maxW / img.width : 1;
        const W = Math.round(img.width * scale);
        const H = Math.round(img.height * scale);
        
        // Draw to offscreen canvas
        const offscreen = document.createElement('canvas');
        offscreen.width = W;
        offscreen.height = H;
        const octx = offscreen.getContext('2d');
        octx.drawImage(img, 0, 0, W, H);
        
        // Get OpenCV Mat
        const src = cv.imread(offscreen);
        const gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        
        // --- Step 1: Detect rectangular answer boxes ---
        // Use adaptive threshold to get binary image
        const binary = new cv.Mat();
        cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 10);
        
        // Find contours
        const contours = new cv.MatVector();
        const hierarchy = new cv.Mat();
        cv.findContours(binary, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);
        
        const answerBoxes = [];
        
        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const rect = cv.boundingRect(cnt);
          
          // Filter: small to medium rectangular boxes (answer boxes)
          // Answer boxes are typically 30-100px wide/tall (on 1600px image)
          const { x, y, width, height } = rect;
          
          if (width > 25 && width < 150 && height > 25 && height < 150) {
            const aspect = width / height;
            // Answer boxes are close to square
            if (aspect > 0.4 && aspect < 2.5) {
              // Also check it's not a huge border box
              if (width < W * 0.45 && height < H * 0.45) {
                answerBoxes.push({ x, y, w: width, h: height });
              }
            }
          }
        }
        
        // Merge overlapping boxes
        const mergedBoxes = mergeBoxes(answerBoxes, W, H);
        
        // --- Step 2: Detect horizontal lines (writing lines) ---
        const horizontalLines = detectHorizontalLines(gray, W, H);
        
        // --- Step 3: Create result - erase answer areas ---
        const result = octx.getImageData(0, 0, W, H);
        const rdata = result.data;
        
        // Erase boxes
        for (const box of mergedBoxes) {
          eraseRegion(rdata, W, H, box.x, box.y, box.w, box.h, scale);
        }
        
        // Erase on lines
        for (const line of horizontalLines) {
          eraseOnLine(rdata, gray, W, H, line, scale);
        }
        
        // Clean up
        src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
        
        // Draw result
        ctx.putImageData(result, 0, 0);
        
        resolve({
          dataURL: previewCanvas.toDataURL('image/png'),
          boxes: mergedBoxes.length,
          lines: horizontalLines.length
        });
      });
    }
    
    function mergeBoxes(boxes, W, H) {
      if (!boxes.length) return [];
      
      // Sort by area descending
      boxes.sort((a, b) => (b.w * b.h) - (a.w * a.h));
      
      const merged = [];
      const used = new Array(boxes.length).fill(false);
      
      for (let i = 0; i < boxes.length; i++) {
        if (used[i]) continue;
        
        let { x, y, w, h } = boxes[i];
        let changed = true;
        
        // Expand box to include nearby boxes
        while (changed) {
          changed = false;
          for (let j = i + 1; j < boxes.length; j++) {
            if (used[j]) continue;
            const b = boxes[j];
            // Check if b is close to current merged box
            const gap = 15;
            if (Math.abs(b.x - (x + w)) < gap && Math.abs(b.y - y) < h * 0.8) {
              // Extend right
              x = Math.min(x, b.x);
              y = Math.min(y, b.y);
              h = Math.max(h, b.y + b.h - y);
              w = Math.max(w, b.x + b.w - x);
              used[j] = true;
              changed = true;
            }
          }
        }
        
        merged.push({ x, y, w, h });
      }
      
      return merged;
    }
    
    function detectHorizontalLines(gray, W, H) {
      // Use morphological operations to detect horizontal lines
      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(W / 4, 1));
      const dilated = new cv.Mat();
      const morphed = new cv.Mat();
      
      cv.dilate(gray, dilated, kernel);
      cv.erode(dilated, morphed, kernel);
      
      // Threshold to get strong horizontal structures
      const thresh = new cv.Mat();
      cv.threshold(morphed, thresh, 200, 255, cv.THRESH_BINARY);
      
      // Find contours again to get line positions
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      cv.findContours(thresh, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);
      
      const lines = [];
      
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const rect = cv.boundingRect(cnt);
        
        // Very flat rectangles = horizontal lines
        if (rect.height < 8 && rect.width > 100) {
          lines.push({ x: rect.x, y: rect.y, w: rect.width, h: rect.height });
        }
      }
      
      // Merge overlapping lines
      lines.sort((a, b) => a.y - b.y);
      const mergedLines = [];
      
      for (const line of lines) {
        const last = mergedLines[mergedLines.length - 1];
        if (last && Math.abs(line.y - last.y) < 10) {
          last.y = Math.min(last.y, line.y);
          last.h = Math.max(last.y + last.h - last.y, line.y + line.h - last.y);
          last.w = Math.max(last.x + last.w, line.x + line.w) - last.x;
        } else {
          mergedLines.push({ ...line });
        }
      }
      
      kernel.delete(); dilated.delete(); morphed.delete(); thresh.delete();
      contours.delete(); hierarchy.delete();
      
      return mergedLines;
    }
    
    function eraseRegion(data, W, H, x, y, w, h, scale) {
      // Fill region with near-white paper color
      const paperR = 252, paperG = 250, paperB = 246;
      
      x = Math.max(0, Math.round(x));
      y = Math.max(0, Math.round(y));
      w = Math.min(W - x, Math.round(w));
      h = Math.min(H - y, Math.round(h));
      
      for (let py = y; py < y + h; py++) {
        for (let px = x; px < x + w; px++) {
          const idx = (py * W + px) * 4;
          data[idx] = paperR;
          data[idx + 1] = paperG;
          data[idx + 2] = paperB;
          data[idx + 3] = 255;
        }
      }
    }
    
    function eraseOnLine(data, gray, W, H, line, scale) {
      // For each writing line, find dark pixels ON the line and erase them
      // The line is a horizontal strip; we erase strokes within it
      const y1 = Math.max(0, line.y - 2);
      const y2 = Math.min(H, line.y + line.h + 10); // Expand to include writing above line
      
      const paperR = 252, paperG = 250, paperB = 246;
      
      // Get grayscale data
      const grayData = gray.data;
      
      // Analyze the line region to find "strokes" (darker pixels)
      // Group connected dark pixels
      for (let py = y1; py < y2; py++) {
        for (let px = line.x; px < line.x + line.w; px++) {
          const idx = py * W + px;
          const brightness = grayData[idx];
          
          // If pixel is significantly darker than paper (~240), it's ink
          if (brightness < 180) {
            // Check this pixel is part of a handwriting stroke (not just noise)
            // Look at local neighborhood
            let darkCount = 0;
            for (let dy = -3; dy <= 3; dy++) {
              for (let dx = -5; dx <= 5; dx++) {
                const nx = px + dx, ny = py + dy;
                if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                  if (grayData[ny * W + nx] < 180) darkCount++;
                }
              }
            }
            
            // If enough neighbors are dark, this is handwriting - erase it
            if (darkCount >= 5) {
              // Erase a small region around this pixel
              for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -6; dx <= 6; dx++) {
                  const nx = px + dx, ny = py + dy;
                  if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                    const nidx = (ny * W + nx) * 4;
                    data[nidx] = paperR;
                    data[nidx + 1] = paperG;
                    data[nidx + 2] = paperB;
                    data[nidx + 3] = 255;
                  }
                }
              }
            }
          }
        }
      }
    }
    
    function renderPage(idx) {
      if (!pages[idx]) return;
      
      const page = pages[idx];
      
      // Create canvas with result
      const img = new Image();
      img.onload = () => {
        previewCanvas.width = img.width;
        previewCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);
      };
      img.src = page.dataURL;
      
      $('infoPages').textContent = `${pages.length} 頁`;
      $('infoBoxes').textContent = `偵測到 ${page.boxes} 個答案格`;
      
      resultPanel.classList.add('show');
      showStatus('完成 ✓', 'done');
    }
    
    function downloadResult() {
      if (!pages[currentPage]) return;
      
      // Create download canvas
      const link = document.createElement('a');
      link.download = `cleaned_exam_p${currentPage + 1}.png`;
      link.href = pages[currentPage].dataURL;
      link.click();
    }
    
    function showStatus(msg, type) {
      status.innerHTML = msg;
      status.className = 'status' + (msg ? ` show ${type}` : '');
    }
  </script>
</body>
</html>
